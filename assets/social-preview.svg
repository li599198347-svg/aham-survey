<svg width="1280" height="1280" viewBox="0 0 1280 1280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="survey-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5366C9"/>
      <stop offset="1" stop-color="#3D4FA6"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="1280" fill="#FFFFFF"/>
  <g transform="translate(0,320)">
    <rect x="1" y="1" width="1278" height="638" fill="#FFFFFF" stroke="#E7E7E7" stroke-width="2"/>
    <rect x="0" y="0" width="1280" height="6" fill="#4F61C4"/>

    <!-- Survey logo：蓝靛圆角方 + 白 A + AI 星点（origin 96,212 size168） -->
    <g>
      <rect x="96" y="212" width="168" height="168" rx="42" fill="url(#survey-bg)"/>
      <text x="180" y="344" font-size="128" font-weight="700" fill="#FFFFFF" text-anchor="middle"
            font-family="'Inter','PingFang SC',system-ui,sans-serif">A</text>
      <!-- sparkle 4-point star -->
      <path d="M222 246 C224 258 228 262 240 264 C228 266 224 270 222 282 C220 270 216 266 204 264 C216 262 220 258 222 246 Z" fill="#FFFFFF"/>
      <circle cx="244" cy="244" r="5" fill="#FFFFFF" opacity="0.85"/>
    </g>

    <g font-family="'Inter','PingFang SC','Microsoft YaHei',system-ui,-apple-system,sans-serif">
      <text x="312" y="268" font-size="96" font-weight="700" fill="#262626" letter-spacing="-1">Aham Survey</text>
      <text x="316" y="332" font-size="40" font-weight="500" fill="#6E6E6E">现场调研工具 · macOS</text>
      <text x="316" y="382" font-size="26" font-weight="400" fill="#9B9B9B">项目制调研 · 行业模板 · 本地语音 · AI 追问与报告</text>
    </g>

    <g transform="translate(96,456)">
      <rect width="38" height="38" rx="8" fill="#5366C9"/>
      <rect x="50" width="38" height="38" rx="8" fill="#3D4FA6"/>
      <rect x="100" width="38" height="38" rx="8" fill="#F3F3F3"/>
      <rect x="150" width="38" height="38" rx="8" fill="#E7E7E7"/>
      <rect x="200" width="38" height="38" rx="8" fill="#262626"/>
    </g>

    <g font-family="'Inter','PingFang SC','Microsoft YaHei',system-ui,sans-serif">
      <text x="98" y="560" font-size="26" font-weight="400" fill="#6E6E6E">把灵光一现，做成能用的 AI 工具。</text>
      <text x="1182" y="560" font-size="26" font-weight="600" fill="#4F61C4" text-anchor="end">macOS</text>
    </g>
  </g>
</svg>
